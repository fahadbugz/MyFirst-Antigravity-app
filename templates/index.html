<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Insights</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-background">
        <div class="glow-sphere glow-sphere-1"></div>
        <div class="glow-sphere glow-sphere-2"></div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-logo-section">
                <div class="bq-logo-icon">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                    </svg>
                </div>
                <div>
                    <h1>BigQuery Release Insights</h1>
                    <p class="subtitle">Stay updated with Google BigQuery changes, features, and issue fixes</p>
                </div>
            </div>
            
            <div class="header-actions">
                <div class="sync-status">
                    <span class="status-indicator"></span>
                    <span id="sync-time-text">Checking for updates...</span>
                </div>
                <div class="theme-switch-container">
                    <span class="theme-switch-label" title="Dark Mode">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </span>
                    <label class="theme-switch">
                        <input type="checkbox" id="theme-checkbox" aria-label="Toggle Dark/Light Theme">
                        <span class="slider round"></span>
                    </label>
                    <span class="theme-switch-label" title="Light Mode">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                    </span>
                </div>
                <button id="btn-export-csv" class="btn btn-outline btn-icon" title="Export Current List to CSV">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    <span>Export CSV</span>
                </button>
                <button id="btn-refresh" class="btn btn-primary btn-icon" title="Refresh Release Notes">
                    <svg id="icon-refresh" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
                    </svg>
                    <svg id="icon-spinner" class="spinner hide" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
                        <circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.2)"></circle>
                        <path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor"></path>
                    </svg>
                    <span>Refresh Feed</span>
                </button>
            </div>
        </header>

        <!-- Stats Overview Card -->
        <section class="stats-overview" id="stats-panel">
            <div class="stat-card">
                <span class="stat-num" id="stat-total-releases">0</span>
                <span class="stat-label">Days Logged</span>
            </div>
            <div class="stat-card">
                <span class="stat-num text-feature" id="stat-total-features">0</span>
                <span class="stat-label">Features Introduced</span>
            </div>
            <div class="stat-card">
                <span class="stat-num text-issue" id="stat-total-issues">0</span>
                <span class="stat-label">Issues & Fixes</span>
            </div>
            <div class="stat-card">
                <span class="stat-num text-deprecation" id="stat-total-deprecations">0</span>
                <span class="stat-label">Deprecations</span>
            </div>
        </section>

        <!-- Toolbar: Search & Filter -->
        <section class="toolbar">
            <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="search-input" placeholder="Search across update descriptions, keywords, titles...">
                <button id="search-clear" class="search-clear-btn hide" title="Clear search">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>

            <div class="filter-tabs" id="filter-tabs-container">
                <button class="filter-tab active" data-filter="all">All Updates</button>
                <button class="filter-tab" data-filter="Feature">
                    <span class="dot dot-feature"></span> Features
                </button>
                <button class="filter-tab" data-filter="Issue">
                    <span class="dot dot-issue"></span> Issues
                </button>
                <button class="filter-tab" data-filter="Deprecation">
                    <span class="dot dot-deprecation"></span> Deprecations
                </button>
                <button class="filter-tab" data-filter="General">
                    <span class="dot dot-general"></span> General
                </button>
            </div>
        </section>

        <!-- Main Feed Grid -->
        <main class="feed-container" id="feed-container">
            <!-- Skeleton items will show here during loading -->
        </main>
    </div>

    <!-- Floating Action Selection Bar -->
    <div class="selection-bar-container" id="selection-bar">
        <div class="selection-bar">
            <div class="selection-info">
                <span class="badge badge-selection" id="selection-count">0</span>
                <span>updates selected to tweet/share</span>
            </div>
            <div class="selection-actions">
                <button class="btn btn-outline btn-sm" id="btn-clear-selection">Clear</button>
                <button class="btn btn-primary btn-sm btn-icon" id="btn-tweet-selected">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path>
                    </svg>
                    <span>Tweet Selected</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Tweet Composer Modal -->
    <div class="modal-backdrop hide" id="tweet-modal">
        <div class="modal-card">
            <div class="modal-header">
                <h3>Share on Twitter / X</h3>
                <button class="btn-close" id="btn-close-modal" title="Close Modal">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            
            <div class="modal-body">
                <div class="composer-container">
                    <textarea id="tweet-textarea" rows="6" placeholder="What's happening?"></textarea>
                    
                    <div class="composer-footer">
                        <span class="char-count-text" id="tweet-char-count">0 / 280</span>
                        <div class="char-progress-track">
                            <div class="char-progress-bar" id="tweet-char-progress"></div>
                        </div>
                    </div>
                </div>

                <!-- Template Selector -->
                <div class="template-section">
                    <h4>Tweet Styles</h4>
                    <div class="template-chips" id="template-chips-container">
                        <button class="chip active" data-style="hype">🔥 Hype</button>
                        <button class="chip" data-style="dev">💻 Dev-Friendly</button>
                        <button class="chip" data-style="minimal">📝 Minimal</button>
                        <button class="chip" data-style="formal">👔 Corporate</button>
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-outline" id="btn-copy-tweet">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    <span id="copy-btn-text">Copy Text</span>
                </button>
                <button class="btn btn-primary btn-icon" id="btn-post-tweet">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path>
                    </svg>
                    <span>Post to X</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast-container"></div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
